<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(12, 15, 26);
            height: 100vh;
        }
        
        .list {
            display: flex;
            gap: 5px;
            height: 200px;
            list-style: none;
        }
        
        .generetor {
            display: block;
            background: linear-gradient(135deg, rgba(0, 245, 160, 0.8), rgba(0, 245, 160, 0.533));
            border: none;
            border-radius: 10px;
            color: rgb(255, 255, 255);
            font-weight: 800;
            cursor: pointer;
            padding: 13px;
            width: 100%;
            font-size: 0.9rem;
            transition: 0.2s;
            letter-spacing: 0.02em;
        }
        
        .item {
            display: flex;
            align-items: end;
            padding: 20px;
            justify-content: center;
            width: 150px;
            background-color: rgb(82, 0, 54);
            margin-bottom: 20px;
        }
        
        .btn {
            font-size: 0.6rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.2);
            color: rgb(255, 255, 255);
            border-radius: 4px;
            padding: 2px 5px;
            border: none;
        }
        
    </style>
    
</head>
<body>
    <div class="container">
        <ul class="list">
            <li class="item"></li>
        </ul>
        <button class="generetor">🎲 YANGI RANGLAR (qulflanganlari saqlanadi)</button>
    </div>
    
    <script>
        const list = document.querySelector(".list")
        
        function render(){
            list.innerHTML = ""
            for(let i = 0; i < 6; i++){
                let color = randomColor()
                let li = document.createElement("li")
                li.classList.add("item")
                li.style.backgroundColor = color
                
                let btn = document.createElement("button")
                btn.innerHTML = color
                btn.classList.add("btn")
                
                btn.onclick = () => {
                    let item = btn.innerHTML
                    navigator.clipboard.writeText(item)
                    
                    btn.innerHTML = "copy"
                    
                    setTimeout(() => 
                    btn.innerHTML = item
                    ,1000)
                }
                
                li.appendChild(btn)
                list.appendChild(li)
            }
        }
        
        function randomColor() {
            return "#" + Math.floor(Math.random() * 0xffffff).toString(16)
        }
        
        const generetor = document.querySelector(".generetor")
        
        generetor.onclick = () => 
        render()
        
        render()
    </script>
</body>
</html>
